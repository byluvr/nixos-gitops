- name: GitOps Deployment
  hosts: all
  tasks:
  	- name: Copy conf to remote
  	  copy:
  	    src: "../hosts/{{ inventory_hostname }}.nix"
  	    dest: "/etc/nixos/configuration.nix"
  	    owner: root
  	    group: root
  	    mode '0644'

  	-  name: Apply changes
  	   shell: nixos-rebuild switch
